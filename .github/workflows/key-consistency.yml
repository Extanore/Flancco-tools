name: SUPA_KEY consistency check

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.mjs'
      - 'scripts/check-supabase-keys.mjs'
      - '.github/workflows/key-consistency.yml'
  pull_request:
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.mjs'
      - 'scripts/check-supabase-keys.mjs'
      - '.github/workflows/key-consistency.yml'

jobs:
  check:
    name: Scan SUPA_KEY/URL consistentie
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-supabase-keys.mjs
