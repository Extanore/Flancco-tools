<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flancco — Planning</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #1A1A2E;
    --navy-light: #2a2a4a;
    --red: #E74C3C;
    --green: #27AE60;
    --blue: #3498DB;
    --orange: #F39C12;
    --grey: #6B7280;
    --light: #F3F4F6;
    --white: #FFFFFF;
    --rule: #E5E7EB;
    --radius: 10px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--light); color: #1f2937; }

  /* LOADING */
  .loading-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
  .loading-wrap p { font-size: 14px; color: var(--grey); }
  .loading-wrap::before { content: ''; width: 32px; height: 32px; border: 3px solid var(--rule); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: var(--white); padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(26,26,46,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-left h1 { font-size: 20px; font-weight: 800; white-space: nowrap; letter-spacing: -0.3px; }
  .header-left h1 span { color: var(--red); }
  .header-center { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .header-center .week-label { font-size: 14px; font-weight: 600; min-width: 280px; text-align: center; letter-spacing: -0.2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-header {
    padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85);
    text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.2s var(--ease); backdrop-filter: blur(4px);
  }
  .btn-header:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.4); color: white; transform: translateY(-1px); }
  .btn-header.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.5); color: white; }
  .btn-today { background: var(--red); border-color: var(--red); color: white; font-weight: 700; }
  .btn-today:hover { background: #c0392b; border-color: #c0392b; box-shadow: 0 2px 8px rgba(231,76,60,0.4); }
  .nav-arrow { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0; }

  /* SECONDARY BAR */
  .secondary-bar {
    background: var(--white); border-bottom: 1px solid var(--rule);
    padding: 12px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
    position: sticky; top: 54px; z-index: 99;
  }
  .view-toggle { display: flex; background: var(--light); border-radius: 10px; padding: 3px; gap: 2px; }
  .view-toggle .btn-view {
    padding: 6px 18px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: none; background: transparent; color: var(--grey);
    transition: all 0.2s var(--ease); font-family: inherit;
  }
  .view-toggle .btn-view:hover { color: var(--navy); }
  .view-toggle .btn-view.active { background: var(--white); color: var(--navy); box-shadow: var(--shadow-sm); }
  .capacity-bar { display: flex; align-items: center; gap: 12px; }
  .capacity-label { font-size: 12px; color: var(--grey); font-weight: 600; white-space: nowrap; }
  .capacity-track { width: 180px; height: 10px; background: var(--light); border-radius: 5px; overflow: hidden; border: 1px solid var(--rule); }
  .capacity-fill { height: 100%; border-radius: 5px; transition: width 0.4s var(--ease), background 0.3s; }

  /* LEGEND */
  .legend { display: flex; gap: 14px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--grey); font-weight: 500; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* LAYOUT */
  .planning-layout { display: flex; height: calc(100vh - 108px); overflow: hidden; }

  /* FILTERS SIDEBAR */
  .filters-sidebar {
    width: 180px; min-width: 180px; background: var(--white);
    border-right: 1px solid var(--rule); padding: 20px 16px; overflow-y: auto;
    flex-shrink: 0;
  }
  .filter-group { margin-bottom: 20px; }
  .filter-group label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--grey); margin-bottom: 8px; }
  .filter-group select {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--rule); border-radius: 8px;
    font-size: 12px; background: var(--white); color: var(--navy); outline: none;
    transition: border-color 0.2s; font-family: inherit;
  }
  .filter-group select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }

  /* MAIN GRID */
  .grid-area { flex: 1; overflow: auto; padding: 20px; }

  /* WEEK VIEW */
  .week-grid { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
  .week-grid th {
    padding: 12px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--grey); border-bottom: 2px solid var(--rule); background: var(--white);
    position: sticky; top: 0; z-index: 10; text-align: center; font-weight: 700;
  }
  .week-grid th:first-child { text-align: left; width: 160px; min-width: 160px; color: var(--navy); }
  .week-grid th.today-col { background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%); color: var(--orange); border-bottom-color: var(--orange); }
  .week-grid td {
    padding: 6px; border: 1px solid #f0f1f3; vertical-align: top;
    min-height: 70px; height: 80px; background: var(--white);
    transition: background 0.15s;
  }
  .week-grid td:first-child {
    font-size: 13px; font-weight: 600; color: var(--navy);
    padding: 10px 12px; background: #fafbfc; vertical-align: middle;
    width: 160px; min-width: 160px; border-left: none;
  }
  .week-grid tr:hover td:first-child { background: #f0f4f8; }
  .week-grid td.today-col { background: #fffdf5; }
  .week-grid td.drop-hover { background: #e8f4fd; outline: 2px dashed var(--blue); outline-offset: -2px; animation: pulse-border 1.5s ease infinite; }
  @keyframes pulse-border { 0%, 100% { outline-color: var(--blue); } 50% { outline-color: rgba(52,152,219,0.3); } }
  .week-grid td.absent-cell {
    background: repeating-linear-gradient(45deg, #f5f5f5, #f5f5f5 5px, #ececec 5px, #ececec 10px);
    cursor: not-allowed; position: relative;
  }
  .absent-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 10px; color: #bbb; font-style: italic; font-weight: 500; }
  .tech-name-cell { display: flex; align-items: center; gap: 10px; }
  .tech-avatar {
    width: 30px; height: 30px; border-radius: 10px; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; letter-spacing: 0.5px;
  }
  .tech-name-text { line-height: 1.3; }
  .tech-name-text span { display: block; }
  .tech-name-text .tech-label { font-size: 10px; color: var(--grey); font-weight: 500; }

  /* APPOINTMENT CARD */
  .appt-card {
    padding: 7px 9px; border-radius: 8px; margin-bottom: 4px; font-size: 11px;
    cursor: grab; position: relative;
    transition: all 0.2s var(--ease);
    border-left: 3px solid transparent; background: var(--white);
    box-shadow: var(--shadow-sm);
  }
  .appt-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); z-index: 5; }
  .appt-card:active { cursor: grabbing; transform: scale(0.97); box-shadow: var(--shadow-lg); }
  .appt-card .appt-sector { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px; }
  .appt-card .appt-klant { font-weight: 700; color: var(--navy); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
  .appt-card .appt-meta { font-size: 10px; color: var(--grey); margin-top: 2px; }
  .appt-card .appt-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; margin-top: 3px; }
  .appt-card.dragging { opacity: 0.4; transform: scale(0.95); }

  /* SECTOR COLORS */
  .sector-zonnepanelen { border-left-color: var(--orange); background: linear-gradient(135deg, #fff8f0 0%, var(--white) 100%); }
  .sector-zonnepanelen .appt-sector { color: var(--orange); }
  .sector-warmtepomp { border-left-color: var(--red); background: linear-gradient(135deg, #fef2f2 0%, var(--white) 100%); }
  .sector-warmtepomp .appt-sector { color: var(--red); }
  .sector-ventilatie { border-left-color: var(--blue); background: linear-gradient(135deg, #eff6ff 0%, var(--white) 100%); }
  .sector-ventilatie .appt-sector { color: var(--blue); }
  .sector-verwarming { border-left-color: #8B5CF6; background: linear-gradient(135deg, #f5f3ff 0%, var(--white) 100%); }
  .sector-verwarming .appt-sector { color: #8B5CF6; }
  .sector-airco { border-left-color: #06B6D4; background: linear-gradient(135deg, #ecfeff 0%, var(--white) 100%); }
  .sector-airco .appt-sector { color: #06B6D4; }

  /* IN TE PLANNEN SIDEBAR */
  .planning-sidebar {
    width: 300px; min-width: 300px; background: var(--white);
    border-left: 1px solid var(--rule); display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 18px 20px; border-bottom: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-header h3 { font-size: 12px; font-weight: 800; color: var(--navy); text-transform: uppercase; letter-spacing: 1px; }
  .sidebar-count {
    font-size: 11px; color: var(--white); background: linear-gradient(135deg, var(--red) 0%, #c0392b 100%);
    padding: 3px 10px; border-radius: 12px; font-weight: 700; min-width: 24px; text-align: center;
  }
  .sidebar-filters { padding: 12px 20px; border-bottom: 1px solid var(--rule); display: flex; gap: 8px; }
  .sidebar-filters select {
    flex: 1; padding: 7px 10px; border: 1.5px solid var(--rule); border-radius: 8px;
    font-size: 11px; background: var(--white); outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .sidebar-filters select:focus { border-color: var(--blue); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .sidebar-card {
    padding: 14px 16px; border-radius: 12px; margin-bottom: 10px; background: var(--white);
    cursor: grab; position: relative;
    transition: all 0.2s var(--ease);
    border: 1.5px solid var(--rule); border-left: 4px solid transparent;
  }
  .sidebar-card:hover { border-color: var(--blue); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .sidebar-card:active { cursor: grabbing; box-shadow: var(--shadow-lg); transform: scale(0.98); }
  .sidebar-card.dragging { opacity: 0.3; transform: scale(0.95); }
  .sidebar-card .sc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .sidebar-card .urgency-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .urgency-rood { background: var(--red); box-shadow: 0 0 6px rgba(231,76,60,0.4); }
  .urgency-oranje { background: var(--orange); box-shadow: 0 0 6px rgba(243,156,18,0.4); }
  .urgency-blauw { background: var(--blue); }
  .sidebar-card .sc-klant { font-weight: 700; font-size: 14px; color: var(--navy); line-height: 1.2; }
  .sidebar-card .sc-sector {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 6px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .sidebar-card .sc-detail { font-size: 12px; color: var(--grey); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .sidebar-card .sc-detail svg { width: 12px; height: 12px; stroke: var(--grey); flex-shrink: 0; }
  .sidebar-card .sc-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--light); }
  .sidebar-card .sc-due { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .sidebar-card .sc-due svg { width: 12px; height: 12px; flex-shrink: 0; }
  .sidebar-card .sc-duration { font-size: 11px; color: var(--grey); font-weight: 600; background: var(--light); padding: 2px 8px; border-radius: 6px; }
  .due-overdue { color: var(--red); }
  .due-overdue svg { stroke: var(--red); }
  .due-warning { color: var(--orange); }
  .due-warning svg { stroke: var(--orange); }
  .due-normal { color: var(--grey); }
  .due-normal svg { stroke: var(--grey); }

  /* DAY VIEW */
  .day-grid-wrap { overflow-x: auto; }
  .day-grid { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; min-width: 600px; }
  .day-grid th { padding: 10px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--grey); border-bottom: 2px solid var(--rule); background: var(--white);
    position: sticky; top: 0; z-index: 10; text-align: center; font-weight: 700; }
  .day-grid th:first-child { text-align: left; width: 60px; min-width: 60px; }
  .day-grid td { padding: 3px 4px; border: 1px solid #f0f1f3; vertical-align: top;
    min-height: 30px; height: 40px; background: var(--white); transition: background 0.15s; }
  .day-grid td:first-child { font-size: 10px; color: var(--grey); text-align: right; padding: 6px 10px;
    background: #fafbfc; vertical-align: middle; font-weight: 600; }
  .day-grid td.drop-hover { background: #e8f4fd; outline: 2px dashed var(--blue); outline-offset: -2px; }

  /* MONTH VIEW */
  .month-grid { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
  .month-grid th { padding: 10px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--grey); border-bottom: 2px solid var(--rule); background: var(--white);
    text-align: center; font-weight: 700; }
  .month-grid td { padding: 8px; border: 1px solid #f0f1f3; vertical-align: top;
    min-height: 80px; height: 96px; background: var(--white); cursor: pointer;
    transition: all 0.15s; border-radius: 2px; }
  .month-grid td:hover { background: #f8fafc; box-shadow: inset 0 0 0 2px var(--blue); }
  .month-grid td.other-month { background: #fafbfc; color: #d1d5db; }
  .month-grid td.today-cell { background: #fffbeb; box-shadow: inset 0 -2px 0 var(--orange); }
  .month-day-num { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .month-count { font-size: 11px; color: var(--grey); margin-bottom: 3px; font-weight: 500; }
  .month-dots { display: flex; flex-wrap: wrap; gap: 3px; }
  .month-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* CONTEXT MENU */
  .ctx-menu {
    position: fixed; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.08); border-radius: 12px;
    box-shadow: var(--shadow-lg); padding: 6px;
    z-index: 200; min-width: 200px; display: none;
  }
  .ctx-menu .ctx-item {
    padding: 10px 14px; font-size: 13px; cursor: pointer; display: flex; width: 100%;
    align-items: center; gap: 10px;
    background: none; border: none; text-align: left; font-family: inherit; color: var(--navy);
    border-radius: 8px; transition: background 0.15s; font-weight: 500;
  }
  .ctx-menu .ctx-item:hover { background: var(--light); }
  .ctx-menu .ctx-item.danger { color: var(--red); }
  .ctx-menu .ctx-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .ctx-separator { height: 1px; background: var(--rule); margin: 4px 8px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--grey); font-size: 13px; }
  .empty-state-card {
    text-align: center; padding: 60px 32px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .empty-state-card svg { width: 56px; height: 56px; stroke: var(--rule); stroke-width: 1.5; }
  .empty-state-card h3 { font-size: 16px; color: var(--navy); font-weight: 700; }
  .empty-state-card p { font-size: 13px; color: var(--grey); max-width: 280px; line-height: 1.5; }
  .btn-empty {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px; background: var(--navy); color: white;
    border-radius: 10px; font-size: 13px; font-weight: 600; text-decoration: none;
    transition: all 0.2s var(--ease); border: none; cursor: pointer;
  }
  .btn-empty:hover { background: var(--navy-light); transform: translateY(-1px); box-shadow: var(--shadow-md); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 14px 22px;
    border-radius: 12px; font-size: 13px; font-weight: 600; color: white;
    z-index: 300; transform: translateY(20px); opacity: 0;
    transition: all 0.3s var(--ease); pointer-events: none;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast-success { background: linear-gradient(135deg, var(--green) 0%, #219a52 100%); }
  .toast-error { background: linear-gradient(135deg, var(--red) 0%, #c0392b 100%); }

  @media (max-width: 1024px) {
    .filters-sidebar { display: none; }
    .planning-sidebar { width: 260px; min-width: 260px; }
    .header-center .week-label { min-width: auto; font-size: 12px; }
    .legend { display: none; }
  }
  @media (max-width: 768px) {
    .planning-sidebar { position: fixed; right: -300px; top: 108px; bottom: 0; z-index: 50;
      transition: right 0.3s var(--ease); width: 300px; box-shadow: none; }
    .planning-sidebar.open { right: 0; box-shadow: -8px 0 24px rgba(0,0,0,0.12); }
    .header { flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
    .grid-area { padding: 10px; }
    .btn-sidebar-toggle { display: inline-flex; }
  }
  @media (min-width: 769px) {
    .btn-sidebar-toggle { display: none; }
  }
</style>
</head>
<body>

<!-- LOADING STATE -->
<div id="loading" class="loading-wrap">
  <p>Planning laden...</p>
</div>

<!-- HEADER -->
<div id="app" style="display:none;">
  <div class="header">
    <div class="header-left">
      <h1>FLANCC<span>O</span> Planning</h1>
    </div>
    <div class="header-center">
      <button class="btn-header" onclick="prevPeriod()" title="Vorige">&larr;</button>
      <div class="week-label" id="period-label">Week 16 — 14 apr – 18 apr 2026</div>
      <button class="btn-header" onclick="nextPeriod()" title="Volgende">&rarr;</button>
      <button class="btn-header btn-today" onclick="goToday()">Vandaag</button>
    </div>
    <div class="header-right">
      <button class="btn-header btn-sidebar-toggle" onclick="toggleSidebar()">Te plannen</button>
      <a href="./" class="btn-header">&larr; Dashboard</a>
      <button class="btn-header" onclick="doLogout()">Uitloggen</button>
    </div>
  </div>

  <div class="secondary-bar">
    <div class="view-toggle">
      <button class="btn-view active" data-view="week" onclick="switchView('week')">Week</button>
      <button class="btn-view" data-view="dag" onclick="switchView('dag')">Dag</button>
      <button class="btn-view" data-view="maand" onclick="switchView('maand')">Maand</button>
    </div>
    <div class="capacity-bar">
      <span class="capacity-label" id="capacity-label">0/25 ingepland</span>
      <div class="capacity-track"><div class="capacity-fill" id="capacity-fill"></div></div>
    </div>
  </div>

  <div class="planning-layout">
    <!-- FILTERS -->
    <div class="filters-sidebar">
      <div class="filter-group">
        <label>Sector</label>
        <select id="filter-sector" onchange="applyFilters()">
          <option value="">Alle sectoren</option>
          <option value="zonnepanelen">Zonnepanelen</option>
          <option value="warmtepomp">Warmtepomp</option>
          <option value="ventilatie">Ventilatie</option>
          <option value="verwarming">Verwarming</option>
          <option value="airco">Airco</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Regio</label>
        <select id="filter-regio" onchange="applyFilters()">
          <option value="">Alle regio's</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Technieker</label>
        <select id="filter-tech" onchange="applyFilters()">
          <option value="">Alle techniekers</option>
        </select>
      </div>
      <div class="legend" style="margin-top:16px;">
        <span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span> Zon</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span> Warmtepomp</span>
        <span class="legend-item"><span class="legend-dot" style="background:#06B6D4"></span> Airco</span>

<script>

// =============================================
// HELPERS
// =============================================
function esc(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function formatDate(d) {
  return d.getDate() + '/' + (d.getMonth() + 1);
}

function formatDateFull(d) {
  var months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function formatDateISO(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseDate(s) {
  if (!s) return null;
  var parts = s.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function getWeekNumber(d) {
  var dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  dt.setUTCDate(dt.getUTCDate() + 4 - (dt.getUTCDay() || 7));
  var yearStart = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - yearStart) / 86400000) + 1) / 7);
}

function getDayNames() { return ['Ma','Di','Wo','Do','Vr']; }

function getWeekDates(date) {
  var d = new Date(date);
  var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
  var monday = new Date(d.setDate(diff));
  monday.setHours(0,0,0,0);
  var dates = [];
  for (var i = 0; i < 5; i++) {
    var dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    dates.push(dd);
  }
  return dates;
}

function getMonthDates(date) {
  var year = date.getFullYear();
  var month = date.getMonth();
  var firstDay = new Date(year, month, 1);
  var lastDay = new Date(year, month + 1, 0);
  // Start from Monday of the first week
  var startDay = new Date(firstDay);
  var dow = startDay.getDay();
  startDay.setDate(startDay.getDate() - (dow === 0 ? 6 : dow - 1));
  var dates = [];
  var d = new Date(startDay);
  // Fill 6 weeks
  for (var i = 0; i < 42; i++) {
    dates.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function getSectorColor(sector) {
  var map = {
    zonnepanelen: '#F39C12',
    warmtepomp: '#E74C3C',
    ventilatie: '#1A1A2E',
    verwarming: '#6B7280',
    airco: '#3498DB'
  };
  return map[(sector || '').toLowerCase()] || '#6B7280';
}

function getSectorIcon(sector) {
  var map = {
    zonnepanelen: '\u2600',
    warmtepomp: '\uD83D\uDD25',
    ventilatie: '\uD83C\uDF2C',
    verwarming: '\u2668',
    airco: '\u2744'
  };
  return map[(sector || '').toLowerCase()] || '\u2699';
}

function getSectorClass(sector) {
  return 'sector-' + (sector || 'overig').toLowerCase();
}

function getUrgencyColor(beurt) {
  if (!beurt.due_date) return 'blauw';
  var today = new Date();
  today.setHours(0,0,0,0);
  var due = parseDate(beurt.due_date);
  if (!due) return 'blauw';
  var diffDays = Math.floor((due - today) / 86400000);
  if (diffDays < -14) return 'rood';
  if (diffDays < 0) return 'oranje';
  return 'blauw';
}

function getUrgencySortValue(beurt) {
  var c = getUrgencyColor(beurt);
  if (c === 'rood') return 0;
  if (c === 'oranje') return 1;
  return 2;
}

function getClientInfo(beurt) {
  // Try to get info from contract, then from clients
  var contract = allContracten.find(function(c) { return c.id === beurt.contract_id; });
  if (contract) {
    var client = allClients.find(function(cl) { return cl.id === contract.client_id; });
    return {
      naam: contract.klant_naam || (client ? (client.company_name || client.contact_person) : ''),
      adres: contract.klant_adres || '',
      postcode: contract.klant_postcode || (client ? client.postal_code : ''),
      gemeente: contract.klant_gemeente || (client ? client.city : ''),
      sector: beurt.sector || contract.sector || '',
      sectorDetails: (typeof contract.sector_details === 'object' && contract.sector_details)
        ? Object.values(contract.sector_details).map(function(v) {
            return typeof v === 'object' ? (v.type || v.formule || v.merk || '') : v;
          }).filter(Boolean).join(', ')
        : (contract.sector_details || '')
    };
  }
  return {
    naam: 'Onbekend',
    adres: '',
    postcode: '',
    gemeente: '',
    sector: beurt.sector || '',
    sectorDetails: ''
  };
}

function getTechInitials(tech) {
  var v = (tech.voornaam || '').charAt(0).toUpperCase();
  var n = (tech.naam || '').charAt(0).toUpperCase();
  return v + n || '?';
}

function isTechAbsent(techId, date) {
  var ds = formatDateISO(date);
  return allAfwezigheden.some(function(a) {
    return a.technieker_id === techId && ds >= a.van_datum && ds <= a.tot_datum;
  });
}

function techHasCert(techId, sector) {
  if (!sector) return true;
  return allTechSectoren.some(function(ts) {
    return ts.technieker_id === techId && ts.sector.toLowerCase() === sector.toLowerCase();
  });
}

function getBeurtenForTechDay(techId, date) {
  var ds = formatDateISO(date);
  return allBeurten.filter(function(b) {
    return b.technieker_id === techId && b.plan_datum === ds &&
      (b.status === 'ingepland' || b.status === 'uitgevoerd');
  });
}

function getInTePlannen() {
  return allBeurten.filter(function(b) {
    return b.status === 'in_te_plannen';
  });
}

function getWeekBeurten(dates) {
  var start = formatDateISO(dates[0]);
  var end = formatDateISO(dates[dates.length - 1]);
  return allBeurten.filter(function(b) {
    return b.plan_datum && b.plan_datum >= start && b.plan_datum <= end &&
      (b.status === 'ingepland' || b.status === 'uitgevoerd');
  });
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.className = 'toast toast-' + (type || 'success') + ' show';
  t.textContent = msg;
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// =============================================
// AUTH
// =============================================
async function checkAuth() {
  var session = null;

  // Method 1: getSession from localStorage
  try {
    var res = await sb.auth.getSession();
    session = res.data.session;
  } catch(e) {}

  // Method 2: try refreshing stored refresh token
  if (!session) {
    try {
      var ref = await sb.auth.refreshSession();
      session = ref.data.session;
    } catch(e) {}
  }

  // Method 3: check localStorage directly and setSession
  if (!session) {
    try {
      var key = 'sb-dhuqpxwwavqyxaelxuzl-auth-token';
      var stored = localStorage.getItem(key);
      if (stored) {
        var parsed = JSON.parse(stored);
        if (parsed.access_token && parsed.refresh_token) {
          var set = await sb.auth.setSession({
            access_token: parsed.access_token,
            refresh_token: parsed.refresh_token
          });
          session = set.data.session;
        }
      }
    } catch(e) {}
  }

  if (!session) {
    window.location.href = './';
    return;
  }

  currentUser = session.user;
  var roleQ = await sb.from('user_roles').select('*').eq('user_id', currentUser.id).single();
  if (roleQ.error || !roleQ.data || roleQ.data.role !== 'admin') {
    window.location.href = './';
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadPlanningData();
  renderView();
  renderSidebar();
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = './';
}

// =============================================
// DATA LOADING
// =============================================
async function loadPlanningData() {
  var results = await Promise.all([
    sb.from('onderhoudsbeurten').select('*').order('due_date', { ascending: true }),
    sb.from('techniekers').select('*').eq('actief', true).order('naam'),
    sb.from('technieker_sectoren').select('*'),
    sb.from('technieker_afwezigheden').select('*'),
    sb.from('contracten').select('*'),
    sb.from('clients').select('*'),
    sb.from('duur_instellingen').select('*'),
    sb.from('partners').select('id, naam, slug, bedrijfsnaam')
  ]);

  allBeurten = results[0].data || [];
  allTechniekers = results[1].data || [];
  allTechSectoren = results[2].data || [];
  allAfwezigheden = results[3].data || [];
  allContracten = results[4].data || [];
  allClients = results[5].data || [];
  allDuurInstellingen = results[6].data || [];
  allPartners = results[7].data || [];

  populateFilterDropdowns();
}

function populateFilterDropdowns() {
  // Regio filter - collect unique postcode prefixes from contracts
  var regios = {};
  allContracten.forEach(function(c) {
    var pc = c.klant_postcode || '';
    if (pc.length >= 2) regios[pc.substring(0,2)] = true;
  });
  allClients.forEach(function(c) {
    var pc = c.postal_code || '';
    if (pc.length >= 2) regios[pc.substring(0,2)] = true;
  });
  var regioSel = document.getElementById('filter-regio');
  var sbRegioSel = document.getElementById('sb-filter-regio');
  Object.keys(regios).sort().forEach(function(r) {
    regioSel.innerHTML += '<option value="' + r + '">' + r + 'xx</option>';
    sbRegioSel.innerHTML += '<option value="' + r + '">' + r + 'xx</option>';
  });

  // Technieker filter
  var techSel = document.getElementById('filter-tech');
  allTechniekers.forEach(function(t) {
    techSel.innerHTML += '<option value="' + t.id + '">' + esc(t.voornaam + ' ' + t.naam) + '</option>';
  });
}

// =============================================
// FILTERS
// =============================================
function getFilteredTechniekers() {
  var techFilter = document.getElementById('filter-tech').value;
  if (techFilter) return allTechniekers.filter(function(t) { return t.id === techFilter; });
  return allTechniekers;
}

function passesFilters(beurt) {
  var sectorFilter = document.getElementById('filter-sector').value;
  var regioFilter = document.getElementById('filter-regio').value;
  var techFilter = document.getElementById('filter-tech').value;

  var info = getClientInfo(beurt);

  if (sectorFilter && info.sector.toLowerCase() !== sectorFilter) return false;
  if (regioFilter && !(info.postcode || '').startsWith(regioFilter)) return false;
  if (techFilter && beurt.technieker_id !== techFilter) return false;

  return true;
}

function applyFilters() {
  renderView();
}

// =============================================
// NAVIGATION
// =============================================
function prevPeriod() {
  if (currentView === 'week' || currentView === 'dag') {
    currentDate.setDate(currentDate.getDate() - 7);
    if (currentView === 'dag') currentDate.setDate(currentDate.getDate() + 6); // go back 1 day net
  } else {
    currentDate.setMonth(currentDate.getMonth() - 1);
  }
  renderView();
}

function nextPeriod() {
  if (currentView === 'week' || currentView === 'dag') {
    currentDate.setDate(currentDate.getDate() + 7);
    if (currentView === 'dag') currentDate.setDate(currentDate.getDate() - 6);
  } else {
    currentDate.setMonth(currentDate.getMonth() + 1);
  }
  renderView();
}

function goToday() {
  currentDate = new Date();
  renderView();
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.btn-view').forEach(function(b) {
    b.classList.toggle('active', b.dataset.view === view);
  });
  renderView();
}

function toggleSidebar() {
  document.getElementById('planning-sidebar').classList.toggle('open');
}

// =============================================
// RENDERING
// =============================================
function renderView() {
  if (currentView === 'week') renderWeekView();
  else if (currentView === 'dag') renderDayView();
  else renderMonthView();
  renderCapacity();
}

function renderCapacity() {
  var dates = getWeekDates(currentDate);
  var weekBeurten = getWeekBeurten(dates);
  var ingepland = weekBeurten.filter(function(b) { return b.status === 'ingepland'; }).length;
  var pct = Math.min(100, Math.round((ingepland / MAX_WEEK_CAPACITY) * 100));

  document.getElementById('capacity-label').textContent = ingepland + '/' + MAX_WEEK_CAPACITY + ' ingepland deze week';
  var fill = document.getElementById('capacity-fill');
  fill.style.width = pct + '%';
  if (pct >= 100) fill.style.background = 'var(--red)';
  else if (pct >= 80) fill.style.background = 'var(--orange)';
  else fill.style.background = 'var(--green)';
}

// =============================================
// WEEK VIEW
// =============================================
function renderWeekView() {
  var dates = getWeekDates(currentDate);
  var dayNames = getDayNames();
  var today = new Date(); today.setHours(0,0,0,0);
  var weekNum = getWeekNumber(dates[0]);
  var months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

  document.getElementById('period-label').textContent =
    'Week ' + weekNum + ' \u2014 ' + formatDateFull(dates[0]) + ' \u2013 ' + formatDateFull(dates[4]);

  var techniekers = getFilteredTechniekers();

  var html = '<table class="week-grid"><thead><tr><th>Technieker</th>';
  for (var d = 0; d < 5; d++) {
    var isToday = isSameDay(dates[d], today);
    html += '<th class="' + (isToday ? 'today-col' : '') + '">' +
      dayNames[d] + ' ' + formatDate(dates[d]) + '</th>';
  }
  html += '</tr></thead><tbody>';

  if (techniekers.length === 0) {
    html += '<tr><td colspan="6"><div class="empty-state-card">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>' +
      '<h3>Geen actieve techniekers</h3>' +
      '<p>Voeg techniekers toe via het admin dashboard.</p>' +
      '<a href="./index.html?page=techniekers" class="btn-empty">\u2192 Techniekers beheren</a>' +
      '</div></td></tr>';
  }

  techniekers.forEach(function(tech) {
    html += '<tr>';
    html += '<td><div class="tech-name-cell">' +
      '<div class="tech-avatar">' + esc(getTechInitials(tech)) + '</div>' +
      '<span class="tech-name-text">' + esc(tech.voornaam) + ' ' + esc(tech.naam) + '</span></div></td>';

    for (var d = 0; d < 5; d++) {
      var isToday = isSameDay(dates[d], today);
      var absent = isTechAbsent(tech.id, dates[d]);

      if (absent) {
        html += '<td class="absent-cell ' + (isToday ? 'today-col' : '') + '">' +
          '<span class="absent-label">Afwezig</span></td>';
      } else {
        var beurten = getBeurtenForTechDay(tech.id, dates[d]).filter(passesFilters);
        html += '<td class="' + (isToday ? 'today-col' : '') + '" ' +
          'ondragover="onDragOver(event)" ondrop="onDrop(event, \'' + tech.id + '\', \'' + formatDateISO(dates[d]) + '\')">';
        beurten.forEach(function(b) {
          var info = getClientInfo(b);
          html += renderApptCard(b, info);
        });
        html += '</td>';
      }
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('grid-area').innerHTML = html;
}

function renderApptCard(b, info) {
  return '<div class="appt-card ' + getSectorClass(info.sector) + '" ' +
    'draggable="true" ondragstart="onDragStart(event, \'' + b.id + '\')" ' +
    'oncontextmenu="onCardContext(event, \'' + b.id + '\')" ' +
    'title="' + esc(info.naam) + ' - ' + esc(info.sector) + '">' +
    '<div class="appt-sector">' + getSectorIcon(info.sector) + ' ' + esc(info.sector) + '</div>' +
    '<div class="appt-klant">' + esc(info.naam) + '</div>' +
    '<div class="appt-meta">' + esc(info.postcode) + ' ' + esc(info.gemeente) +
    (b.duur_minuten ? ' \u00B7 ' + b.duur_minuten + 'min' : '') + '</div>' +
    (b.status === 'uitgevoerd' ? '<span class="appt-badge" style="background:#DCFCE7;color:#166534;">\u2713 Uitgevoerd</span>' : '') +
    (b.status === 'ingepland' ? '<span class="appt-badge" style="background:#DBEAFE;color:#1E40AF;">Ingepland</span>' : '') +
    '</div>';
}

// =============================================
// DAY VIEW
// =============================================
function renderDayView() {
  var today = new Date(); today.setHours(0,0,0,0);
  var viewDate = new Date(currentDate); viewDate.setHours(0,0,0,0);
  var dayNames = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];

  document.getElementById('period-label').textContent =
    dayNames[viewDate.getDay()] + ' ' + formatDateFull(viewDate);

  var techniekers = getFilteredTechniekers();
  var dateStr = formatDateISO(viewDate);
  var slots = [];
  for (var h = 8; h <= 17; h++) {
    slots.push(String(h).padStart(2,'0') + ':00');
    slots.push(String(h).padStart(2,'0') + ':30');
  }

  var html = '<div class="day-grid-wrap"><table class="day-grid"><thead><tr><th>Tijd</th>';
  techniekers.forEach(function(tech) {
    html += '<th>' + esc(tech.voornaam) + ' ' + esc(tech.naam) + '</th>';
  });
  html += '</tr></thead><tbody>';

  slots.forEach(function(slot) {
    html += '<tr><td>' + slot + '</td>';
    techniekers.forEach(function(tech) {
      var absent = isTechAbsent(tech.id, viewDate);
      if (absent) {
        html += '<td class="absent-cell"><span class="absent-label">Afwezig</span></td>';
      } else {
        // Find beurten that start at this time slot
        var beurten = allBeurten.filter(function(b) {
          return b.technieker_id === tech.id && b.plan_datum === dateStr &&
            b.start_tijd && b.start_tijd.substring(0,5) === slot &&
            (b.status === 'ingepland' || b.status === 'uitgevoerd');
        }).filter(passesFilters);

        html += '<td ondragover="onDragOver(event)" ondrop="onDropDay(event, \'' + tech.id + '\', \'' + dateStr + '\', \'' + slot + '\')">';
        beurten.forEach(function(b) {
          var info = getClientInfo(b);
          html += renderApptCard(b, info);
        });
        html += '</td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';

  // Also show unscheduled beurten for this day (no start_tijd)
  var unscheduled = allBeurten.filter(function(b) {
    return b.plan_datum === dateStr && !b.start_tijd &&
      (b.status === 'ingepland' || b.status === 'uitgevoerd');
  }).filter(passesFilters);

  if (unscheduled.length > 0) {
    html += '<div style="margin-top:16px; padding: 12px; background:var(--white); border-radius:var(--radius);">';
    html += '<h4 style="font-size:13px; color:var(--navy); margin-bottom:8px;">Ingepland zonder tijdstip</h4>';
    html += '<div style="display:flex; flex-wrap:wrap; gap:8px;">';
    unscheduled.forEach(function(b) {
      var info = getClientInfo(b);
      var tech = allTechniekers.find(function(t) { return t.id === b.technieker_id; });
      html += '<div class="appt-card ' + getSectorClass(info.sector) + '" style="min-width:180px;" ' +
        'oncontextmenu="onCardContext(event, \'' + b.id + '\')">' +
        '<div class="appt-sector">' + getSectorIcon(info.sector) + ' ' + esc(info.sector) + '</div>' +
        '<div class="appt-klant">' + esc(info.naam) + '</div>' +
        '<div class="appt-meta">' + (tech ? esc(tech.voornaam) + ' ' + esc(tech.naam) : '') + '</div>' +
        '</div>';
    });
    html += '</div></div>';
  }

  document.getElementById('grid-area').innerHTML = html;
}

// =============================================
// SIDEBAR - IN TE PLANNEN
// =============================================
function renderSidebar() {
  var items = getInTePlannen();
  var sectorFilter = document.getElementById('sb-filter-sector').value;
  var regioFilter = document.getElementById('sb-filter-regio').value;

  items = items.filter(function(b) {
    var info = getClientInfo(b);
    if (sectorFilter && info.sector.toLowerCase() !== sectorFilter) return false;
    if (regioFilter && !(info.postcode || '').startsWith(regioFilter)) return false;
    return true;
  });

  // Sort by urgency
  items.sort(function(a, b) {
    return getUrgencySortValue(a) - getUrgencySortValue(b);
  });

  document.getElementById('sidebar-count').textContent = items.length;

  if (items.length === 0) {
    document.getElementById('sidebar-list').innerHTML =
      '<div class="empty-state-card">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>' +
      '<h3>Alles ingepland!</h3>' +
      '<p>Er zijn geen openstaande beurten om in te plannen.</p>' +
      '</div>';
    return;
  }

  var html = '';
  items.forEach(function(b) {
    var info = getClientInfo(b);
    var urg = getUrgencyColor(b);
    var dueClass = urg === 'rood' ? 'due-overdue' : (urg === 'oranje' ? 'due-warning' : 'due-normal');
    var sectorBg = getSectorColor(info.sector);

    html += '<div class="sidebar-card ' + getSectorClass(info.sector) + '" ' +
      'draggable="true" ondragstart="onDragStart(event, \'' + b.id + '\')">' +
      '<div class="sc-header">' +
        '<span class="urgency-dot urgency-' + urg + '"></span>' +
        '<span class="sc-klant">' + esc(info.naam) + '</span>' +
      '</div>' +
      '<div><span class="sc-sector" style="background:' + sectorBg + '22; color:' + sectorBg + ';">' +
      getSectorIcon(info.sector) + ' ' + esc(info.sector) + '</span></div>' +
      '<div class="sc-detail">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ' +
        esc(info.postcode) + ' ' + esc(info.gemeente) +
      '</div>';

    if (info.sectorDetails) {
      html += '<div class="sc-detail">' + esc(info.sectorDetails) + '</div>';
    }

    html += '<div class="sc-footer">';
    if (b.due_date) {
      var due = parseDate(b.due_date);
      html += '<span class="sc-due ' + dueClass + '">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> ' +
        formatDateFull(due) + '</span>';
    }
    if (b.duur_minuten) {
      html += '<span class="sc-duration">\u23F1 ' + b.duur_minuten + ' min</span>';
    }
    html += '</div></div>';
  });

  document.getElementById('sidebar-list').innerHTML = html;
}

// =============================================
// DRAG & DROP
// =============================================
function onDragStart(e, beurtId) {
  dragBeurtId = beurtId;
  e.dataTransfer.setData('text/plain', beurtId);
  e.dataTransfer.effectAllowed = 'move';
  // Add dragging class
  setTimeout(function() {
    e.target.classList.add('dragging');
  }, 0);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Add visual feedback
  var cell = e.target.closest('td');
  if (cell && !cell.classList.contains('absent-cell')) {
    cell.classList.add('drop-hover');
  }
}

// Remove drop-hover on drag leave
document.addEventListener('dragleave', function(e) {
  var cell = e.target.closest('td');
  if (cell) cell.classList.remove('drop-hover');
});

document.addEventListener('dragend', function(e) {
  dragBeurtId = null;
  document.querySelectorAll('.dragging').forEach(function(el) { el.classList.remove('dragging'); });
  document.querySelectorAll('.drop-hover').forEach(function(el) { el.classList.remove('drop-hover'); });
});

async function onDrop(e, techId, dateStr) {
  e.preventDefault();
  document.querySelectorAll('.drop-hover').forEach(function(el) { el.classList.remove('drop-hover'); });

  var beurtId = e.dataTransfer.getData('text/plain') || dragBeurtId;
  if (!beurtId) return;

  await planBeurt(beurtId, techId, dateStr, null);
}

async function onDropDay(e, techId, dateStr, timeSlot) {
  e.preventDefault();
  document.querySelectorAll('.drop-hover').forEach(function(el) { el.classList.remove('drop-hover'); });

  var beurtId = e.dataTransfer.getData('text/plain') || dragBeurtId;
  if (!beurtId) return;

  await planBeurt(beurtId, techId, dateStr, timeSlot);
}

async function planBeurt(beurtId, techId, planDatum, startTijd) {
  var beurt = allBeurten.find(function(b) { return b.id === beurtId; });
  if (!beurt) return;

  var info = getClientInfo(beurt);
  var date = parseDate(planDatum);

  // Validation: check absence
  if (isTechAbsent(techId, date)) {
    showToast('Technieker is afwezig op deze dag', 'error');
    return;
  }

  // Validation: check sector certification
  if (info.sector && !techHasCert(techId, info.sector)) {
    var tech = allTechniekers.find(function(t) { return t.id === techId; });
    showToast((tech ? tech.voornaam + ' ' + tech.naam : 'Technieker') +
      ' heeft geen certificaat voor ' + info.sector, 'error');
    return;
  }

  // Validation: check max beurten per dag
  var tech = allTechniekers.find(function(t) { return t.id === techId; });
  if (tech && tech.max_beurten_per_dag) {
    var dayBeurten = getBeurtenForTechDay(techId, date);
    // Exclude the beurt itself if it's being rescheduled
    dayBeurten = dayBeurten.filter(function(b) { return b.id !== beurtId; });
    if (dayBeurten.length >= tech.max_beurten_per_dag) {
      showToast('Maximum beurten per dag bereikt voor ' + tech.voornaam + ' ' + tech.naam, 'error');
      return;
    }
  }

  // Update in Supabase
  var updateData = {
    technieker_id: techId,
    plan_datum: planDatum,
    status: 'ingepland',
    updated_at: new Date().toISOString()
  };
  if (startTijd) updateData.start_tijd = startTijd;

  var result = await sb.from('onderhoudsbeurten').update(updateData).eq('id', beurtId);

  if (result.error) {
    showToast('Fout bij inplannen: ' + result.error.message, 'error');
    return;
  }

  // Update local state
  beurt.technieker_id = techId;
  beurt.plan_datum = planDatum;
  beurt.status = 'ingepland';
  if (startTijd) beurt.start_tijd = startTijd;

  auditLog('onderhoudsbeurten', beurtId, 'status_wijziging', 'in_te_plannen', 'ingepland');
  showToast(esc(info.naam) + ' ingepland');
  renderView();
  renderSidebar();
}

async function unplanBeurt(beurtId) {
  var beurt = allBeurten.find(function(b) { return b.id === beurtId; });
  if (!beurt) return;

  var result = await sb.from('onderhoudsbeurten').update({
    technieker_id: null,
    plan_datum: null,
    start_tijd: null,
    status: 'in_te_plannen',
    updated_at: new Date().toISOString()
  }).eq('id', beurtId);

  if (result.error) {
    showToast('Fout: ' + result.error.message, 'error');
    return;
  }

  beurt.technieker_id = null;
  beurt.plan_datum = null;
  beurt.start_tijd = null;
  beurt.status = 'in_te_plannen';

  auditLog('onderhoudsbeurten', beurtId, 'status_wijziging', 'ingepland', 'in_te_plannen');
  showToast('Beurt terug naar In te plannen');
  renderView();
  renderSidebar();
}

// =============================================
// CONTEXT MENU
// =============================================
function onCardContext(e, beurtId) {
  e.preventDefault();
  ctxBeurtId = beurtId;
  var menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';

  // Ensure menu stays within viewport
  var rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) {
    menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
  }
  if (rect.bottom > window.innerHeight) {
    menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
  }
}

document.addEventListener('click', function() {
  document.getElementById('ctx-menu').style.display = 'none';
});

function ctxUnplan() {
  if (ctxBeurtId) unplanBeurt(ctxBeurtId);
  ctxBeurtId = null;
}

async function ctxMarkDone() {
  if (!ctxBeurtId) return;
  var beurt = allBeurten.find(function(b) { return b.id === ctxBeurtId; });
  if (!beurt) return;
  var oldStatus = beurt.status;

  var result = await sb.from('onderhoudsbeurten').update({
    status: 'uitgevoerd',
    uitvoer_datum: formatDateISO(new Date()),
    updated_at: new Date().toISOString()
  }).eq('id', ctxBeurtId);

  if (result.error) {
    showToast('Fout: ' + result.error.message, 'error');
  } else {
    beurt.status = 'uitgevoerd';
    beurt.uitvoer_datum = formatDateISO(new Date());
    auditLog('onderhoudsbeurten', ctxBeurtId, 'status_wijziging', oldStatus, 'uitgevoerd');
    showToast('Beurt gemarkeerd als uitgevoerd');
    renderView();
    renderSidebar();
  }
  ctxBeurtId = null;
}

async function ctxCancel() {
  if (!ctxBeurtId) return;
  if (!confirm('Weet je zeker dat je deze beurt wil annuleren?')) { ctxBeurtId = null; return; }

  var beurt = allBeurten.find(function(b) { return b.id === ctxBeurtId; });
  if (!beurt) return;
  var oldStatus = beurt.status;

  var result = await sb.from('onderhoudsbeurten').update({
    status: 'geannuleerd',
    updated_at: new Date().toISOString()
  }).eq('id', ctxBeurtId);

  if (result.error) {
    showToast('Fout: ' + result.error.message, 'error');
  } else {
    beurt.status = 'geannuleerd';
    auditLog('onderhoudsbeurten', ctxBeurtId, 'status_wijziging', oldStatus, 'geannuleerd');
    showToast('Beurt geannuleerd');
    renderView();
    renderSidebar();
  }
  ctxBeurtId = null;
}

// =============================================
// MONTH VIEW HELPER - Recalculate grid properly
// =============================================
// Override month view to show proper Mon-Fri only calendar
function renderMonthView() {
  var today = new Date(); today.setHours(0,0,0,0);
  var monthNames = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
  var month = currentDate.getMonth();
  var year = currentDate.getFullYear();

  document.getElementById('period-label').textContent = monthNames[month] + ' ' + year;

  // Build all dates for the calendar
  var firstDay = new Date(year, month, 1);
  var lastDay = new Date(year, month + 1, 0);
  // Find Monday of first week
  var startDay = new Date(firstDay);
  var dow = startDay.getDay();
  startDay.setDate(startDay.getDate() - (dow === 0 ? 6 : dow - 1));

  var dayNames = getDayNames();
  var html = '<table class="month-grid"><thead><tr>';
  dayNames.forEach(function(n) { html += '<th>' + n + '</th>'; });
  html += '</tr></thead><tbody>';

  var d = new Date(startDay);
  for (var w = 0; w < 6; w++) {
    html += '<tr>';
    for (var day = 0; day < 7; day++) {
      if (day < 5) { // Mon-Fri
        var isOther = d.getMonth() !== month;
        var isToday = isSameDay(d, today);
        var ds = formatDateISO(d);

        var dayBeurten = allBeurten.filter(function(b) {
          return b.plan_datum === ds && (b.status === 'ingepland' || b.status === 'uitgevoerd');
        });

        html += '<td class="' + (isOther ? 'other-month' : '') + (isToday ? ' today-cell' : '') + '" ' +
          'onclick="monthDayClick(\'' + ds + '\')">';
        html += '<div class="month-day-num">' + d.getDate() + '</div>';
        if (dayBeurten.length > 0) {
          html += '<div class="month-count">' + dayBeurten.length + ' beurt' + (dayBeurten.length > 1 ? 'en' : '') + '</div>';
          html += '<div class="month-dots">';
          var sectors = {};
          dayBeurten.forEach(function(b) {
            var info = getClientInfo(b);
            sectors[info.sector] = true;
          });
          Object.keys(sectors).forEach(function(s) {
            html += '<div class="month-dot" style="background:' + getSectorColor(s) + ';"></div>';
          });
          html += '</div>';
        }
        html += '</td>';
      }
      d.setDate(d.getDate() + 1);
    }
    html += '</tr>';
    // Stop if we've passed the month
    if (d.getMonth() !== month && d.getDate() > 7) break;
  }

  html += '</tbody></table>';
  document.getElementById('grid-area').innerHTML = html;
}

// =============================================
// AUDIT LOGGING
async function auditLog(tabel, recordId, actie, oudeWaarde, nieuweWaarde) {
  try {
    var sess = await sb.auth.getSession();
    var userId = (sess && sess.data && sess.data.session) ? sess.data.session.user.id : null;
    await sb.from('audit_log').insert({
      tabel: tabel, record_id: recordId, actie: actie,
      oude_waarde: oudeWaarde || null, nieuwe_waarde: nieuweWaarde || null,
      user_id: userId
    });
  } catch(e) { console.warn('Audit log failed:', e); }
}
