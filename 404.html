<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon-flancco.svg">
<link rel="alternate icon" type="image/x-icon" href="/favicon-flancco.ico">
<link rel="apple-touch-icon" href="/favicon-flancco.svg">
<title>404 — Pagina niet gevonden | Flancco</title>
<style>
  :root { --navy:#1A1A2E; --accent:#E74C3C; --grey:#6B7280; --light:#F3F4F6; }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #ffffff 0%, var(--light) 100%);
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { max-width: 480px; text-align: center; }
  .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0 0 32px; }
  .logo span { color: var(--accent); }
  .code { font-size: 72px; font-weight: 800; letter-spacing: -2px; margin: 0 0 8px; color: var(--navy); }
  h1 { font-size: 20px; font-weight: 700; margin: 0 0 12px; }
  p { font-size: 15px; line-height: 1.6; color: var(--grey); margin: 0 0 28px; }
  a.btn {
    display: inline-block;
    padding: 12px 24px;
    background: var(--navy);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.15s;
  }
  a.btn:hover { background: #2A2A44; }
  .meta { margin-top: 32px; font-size: 12px; color: var(--grey); }
</style>
</head>
<body>
  <main class="wrap">
    <div class="logo">FLANCC<span>O</span></div>
    <div class="code">404</div>
    <h1>Pagina niet gevonden</h1>
    <p>De opgevraagde pagina bestaat niet of is verplaatst.<br>Ga terug naar het platform of neem contact op als u denkt dat dit een fout is.</p>
    <a class="btn" href="/">Terug naar platform</a>
    <div class="meta">&copy; Flancco BV</div>
  </main>
</body>
</html>
